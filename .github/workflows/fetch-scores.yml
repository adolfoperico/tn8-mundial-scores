name: Fetch Mundial 2026 scores

on:
  schedule:
    # Cada 5 min (mínimo permitido por GitHub Actions en cron).
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'fetch-matches.mjs'
      - '.github/workflows/fetch-scores.yml'

permissions:
  contents: write

concurrency:
  group: fetch-scores
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci --silent || npm install --silent

      - name: Fetch scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          COMPETITION_CODE: ${{ vars.COMPETITION_CODE || 'WC' }}
          OUTPUT_PATH: ./resultados.json
        run: node fetch-matches.mjs

      - name: Commit if changed
        run: |
          if [[ -z "$(git status --porcelain resultados.json)" ]]; then
            echo 'No changes to resultados.json'
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add resultados.json
          git commit -m "chore(scores): auto-update $(date -u +%FT%TZ)"
          # Reintenta hasta 3 veces con pull --rebase para superar carreras de push concurrentes
          for i in 1 2 3; do
            if git push; then
              echo "push OK (intento $i)"
              break
            fi
            echo "push rechazado, pull --rebase e intento $((i+1))"
            git pull --rebase --strategy-option=theirs origin main
          done

      - name: Purge jsDelivr cache
        run: |
          # jsDelivr cachea 12h a nivel edge, ignorando ?t= en cache-busters.
          # Purgamos explícitamente para que el próximo poll del browser vea
          # el score actualizado casi al instante.
          curl -sSL "https://purge.jsdelivr.net/gh/adolfoperico/tn8-mundial-scores@main/resultados.json" || true
